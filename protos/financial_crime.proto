// ═══════════════════════════════════════════════════════════════════
// Green Agent -- Unified A2A Protocol Schema v7.0
// Merged schema: Purple A2A protocol messages + Green tool messages
//
// The A2A protocol messages (Transaction, NodeAttributes, TextEvidence,
// GraphFragment, InvestigationRequest, CitedEvidence, InvestigationResult)
// are SHARED with Purple Agent and are FROZEN.
//
// The 'double amount' field is FROZEN -- cannot change to string.
// Python code MUST convert via Decimal(str(proto_tx.amount)) at boundary.
// ═══════════════════════════════════════════════════════════════════

syntax = "proto3";
package financial_crime;

// ═══════════════════════════════════════════════════════════════════
// A2A PROTOCOL MESSAGES (shared with Purple Agent -- FROZEN)
// ═══════════════════════════════════════════════════════════════════

message Transaction {
    string id = 1;
    string source_node = 2;
    string target_node = 3;
    double amount = 4;              // FROZEN: Convert to Decimal(str(amount)) in Python
    string currency = 5;
    int64 timestamp = 6;
    string type = 7;                // "WIRE", "ACH", "CASH_DEPOSIT", "RTGS", "NEFT"
    string reference = 8;
    string branch_code = 9;
}

message NodeAttributes {
    string id = 1;
    string name = 2;
    string entity_type = 3;         // "individual", "business", "bank", "government"
    string jurisdiction = 4;        // ISO country code: "US", "IN", "DE"
    string account_id = 5;
    string ifsc_code = 6;
    string pan_number = 7;
    string address = 8;
    string risk_rating = 9;         // "low", "medium", "high", "pep"
    string swift_code = 10;
}

message TextEvidence {
    string id = 1;
    string source_type = 2;         // "email", "memo", "sar_draft", "teller_note"
    string content = 3;
    string associated_entity = 4;
    int64 timestamp = 5;
}

message GraphFragment {
    string scenario_id = 1;
    int64 generated_at = 2;
    repeated Transaction transactions = 3;
    map<string, NodeAttributes> nodes = 4;
    repeated TextEvidence text_evidence = 5;
    repeated string ground_truth_criminals = 6;  // For evaluation only
}

message InvestigationRequest {
    string subject_id = 1;
    int64 alert_timestamp = 2;
    string case_id = 3;
    int32 hop_depth = 4;            // Flows into DFS max_depth
    string jurisdiction = 5;        // "fincen" or "fiu_ind"
}

message CitedEvidence {
    string transaction_id = 1;
    double amount = 2;
    string relevance = 3;
    int64 timestamp = 4;
}

message InvestigationResult {
    string case_id = 1;
    string sar_narrative = 2;
    string typology_detected = 3;   // "STRUCTURING", "LAYERING", "BOTH", "NONE"
    repeated string involved_entities = 4;
    repeated CitedEvidence cited_evidence = 5;
    double confidence_score = 6;    // Computed, not defaulted
    string jurisdiction = 7;
    int64 investigation_timestamp = 8;  // Set at submit time
}

// ═══════════════════════════════════════════════════════════════════
// GREEN AGENT TOOL MESSAGES (backward compatibility for /a2a/tools/*)
// ═══════════════════════════════════════════════════════════════════

message LegacyTransaction {
  string transaction_id = 1;
  string source = 2;
  string target = 3;
  double amount = 4;
  string currency = 5;
  string timestamp = 6;  // ISO 8601 format
  string transaction_type = 7;
  string memo = 8;
  string label = 9;  // "legitimate", "structuring", "layering"
  double risk_score = 10;
  bool is_international = 11;
  string merchant_type = 12;
}

message KycProfile {
  string account_id = 1;
  string entity_type = 2;
  string name = 3;
  string company = 4;
  string address = 5;
  string country = 6;
  string swift_code = 7;
  string iban = 8;
  double risk_score = 9;
  string verification_status = 10;
  string created_at = 11;
  string last_activity = 12;
}

message LegacyTransactionListResponse {
  string account_id = 1;
  int32 transaction_count = 2;
  repeated LegacyTransaction transactions = 3;
}

message AccountConnection {
  string account_id = 1;
  string relationship = 2;
  int32 transaction_count = 3;
  double total_amount = 4;
}

message AccountConnectionsResponse {
  string account_id = 1;
  int32 connection_count = 2;
  repeated AccountConnection connections = 3;
}

message LegacyInvestigationAssessmentRequest {
  string participant_id = 1;
  string investigation_data_json = 2;  // JSON-serialized dict
}

message RubricBreakdown {
  double pattern_identification = 1;
  double evidence_quality = 2;
  double narrative_clarity = 3;
  double completeness = 4;
}

message LegacyInvestigationAssessmentResponse {
  double score = 1;
  string feedback = 2;
  RubricBreakdown rubric_breakdown = 3;
  repeated string missed_indicators = 4;
  int32 tool_call_count = 5;
  double efficiency_score = 6;
}

message GraphNode {
  string id = 1;
  string entity_type = 2;
  string name = 3;
  string country = 4;
  double risk_score = 5;
  map<string, string> attributes = 6;
}

message GraphEdge {
  string source = 1;
  string target = 2;
  double amount = 3;
  string label = 4;
  map<string, string> attributes = 5;
}

message FinancialGraph {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
  int32 node_count = 3;
  int32 edge_count = 4;
}

message EvidenceDocument {
  string document_id = 1;
  string document_type = 2;  // "SAR", "email", "receipt", etc.
  string subject_id = 3;
  string date = 4;  // ISO 8601 format
  string content = 5;
  map<string, string> metadata = 6;
}

message EvidenceListResponse {
  int32 document_count = 1;
  repeated EvidenceDocument documents = 2;
}
